openapi: 3.1.0
info:
  title: codex-browser buyer callbacks
  version: 0.1.0
  summary: Исходящие callback-вызовы buyer.
  description: |
    Документ фиксирует контракт HTTP callback-вызовов, которые `buyer` отправляет
    во внешний `middle` по адресу `callback_url` из задачи или по адресу
    `MIDDLE_CALLBACK_URL` из конфигурации.

    Доставка имеет семантику at-least-once. Получатель должен дедуплицировать
    события по `event_id` и/или `idempotency_key`.

    Путь `/buyer-callback` является шаблонным receiver endpoint для документации.
    В runtime buyer отправляет запрос на фактический полный URL из `callback_url`
    задачи или из `MIDDLE_CALLBACK_URL`.
paths:
  /buyer-callback:
    post:
      tags:
        - Buyer callbacks
      operationId: receiveBuyerCallback
      summary: Получить callback-событие от buyer.
      description: |
        Шаблон endpoint-а, который должен реализовать внешний получатель callback-а.
        Buyer отправляет этот POST-запрос на фактический полный `callback_url`, а
        не обязательно на путь `/buyer-callback`.

        Успешный HTTP 2xx считается подтверждением доставки. Повторная доставка
        возможна, поэтому ответчик должен корректно обрабатывать дубли.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallbackEventEnvelope'
            examples:
              paymentReady:
                $ref: '#/components/examples/PaymentReadyCallback'
      responses:
        '200':
          description: Callback принят или распознан как дубль.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallbackAck'
              examples:
                accepted:
                  value:
                    accepted: true
                    duplicate: false
                duplicate:
                  value:
                    accepted: false
                    duplicate: true
        '204':
          description: Callback принят без тела ответа.
tags:
  - name: Buyer callbacks
    description: Callback-вызовы, которые buyer отправляет в middle.

components:
  examples:
    PaymentReadyCallback:
      summary: Callback `payment_ready`.
      value:
        event_id: d0e82c3c-320a-4580-9a5c-a61b6d7e5f39
        session_id: 8b69d854-2d5d-4fb3-9946-d09736c8a461
        event_type: payment_ready
        occurred_at: '2026-04-28T09:12:01.123456Z'
        idempotency_key: 8b69d854-2d5d-4fb3-9946-d09736c8a461:payment_ready:payment-ready
        payload:
          order_id: '1585051118'
          message: Получен orderId, шаг оплаты готов.

  schemas:
    JsonValue:
      description: Любое JSON-значение.

    JsonObject:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/JsonValue'

    CallbackAck:
      type: object
      required:
        - accepted
        - duplicate
      properties:
        accepted:
          type: boolean
          description: '`true`, если событие принято как новое.'
        duplicate:
          type: boolean
          default: false
          description: '`true`, если событие уже было принято ранее.'

    AgentStepStatus:
      type: string
      enum:
        - needs_user_input
        - completed
        - failed

    ScenarioStatus:
      type: string
      enum:
        - completed
        - failed

    AuthReasonCode:
      type: string
      enum:
        - auth_ok
        - auth_failed_payload
        - auth_failed_redirect_loop
        - auth_failed_invalid_session
        - auth_refresh_requested
        - auth_not_provided
        - auth_provider_not_supported
        - auth_domain_not_in_allowlist

    EventType:
      type: string
      enum:
        - session_started
        - agent_step_started
        - agent_step_finished
        - ask_user
        - handoff_requested
        - handoff_resumed
        - payment_ready
        - scenario_finished

    CallbackEventEnvelope:
      type: object
      description: |
        Общий envelope callback-события. Конкретный состав `payload` зависит от
        `event_type` и должен соответствовать одной из схем `*Payload`.
      required:
        - event_id
        - session_id
        - event_type
        - occurred_at
        - idempotency_key
        - payload
      properties:
        event_id:
          type: string
        session_id:
          type: string
        event_type:
          $ref: '#/components/schemas/EventType'
        occurred_at:
          type: string
          format: date-time
        idempotency_key:
          type: string
        payload:
          $ref: '#/components/schemas/CallbackPayload'
      additionalProperties: false

    CallbackPayload:
      description: |
        Payload должен соответствовать схеме события, указанного в `event_type`.
        Используется `anyOf`, потому что некоторые payload-формы имеют пересекающиеся
        поля (`message`, `status`, `order_id`) и не должны ломать валидацию при
        появлении дополнительных совместимых полей.
      anyOf:
        - $ref: '#/components/schemas/SessionStartedPayload'
        - $ref: '#/components/schemas/AgentStepStartedPayload'
        - $ref: '#/components/schemas/AgentStepFinishedPayload'
        - $ref: '#/components/schemas/AskUserPayload'
        - $ref: '#/components/schemas/HandoffRequestedPayload'
        - $ref: '#/components/schemas/HandoffResumedPayload'
        - $ref: '#/components/schemas/PaymentReadyPayload'
        - $ref: '#/components/schemas/ScenarioFinishedPayload'

    SessionStartedPayload:
      type: object
      required:
        - message
        - start_url
        - novnc_url
      properties:
        message:
          type: string
        start_url:
          type: string
        novnc_url:
          type: string
      additionalProperties:
        $ref: '#/components/schemas/JsonValue'

    AgentStepStartedPayload:
      type: object
      required:
        - step
        - message
      properties:
        step:
          type: integer
          minimum: 1
        message:
          type: string
      additionalProperties:
        $ref: '#/components/schemas/JsonValue'

    AgentStepFinishedPayload:
      type: object
      required:
        - step
        - status
        - message
        - order_id
      properties:
        step:
          type: integer
          minimum: 1
        status:
          $ref: '#/components/schemas/AgentStepStatus'
        message:
          type: string
        order_id:
          type:
            - string
            - 'null'
        trace:
          $ref: '#/components/schemas/TraceSummary'
      additionalProperties:
        $ref: '#/components/schemas/JsonValue'

    AskUserPayload:
      type: object
      required:
        - message
        - reply_id
      properties:
        message:
          type: string
        reply_id:
          type: string
        reason_code:
          type:
            - string
            - 'null'
          description: |
            Один из канонических auth reason-кодов или другой доменный reason-код.
        context:
          $ref: '#/components/schemas/JsonObject'
      additionalProperties:
        $ref: '#/components/schemas/JsonValue'

    HandoffRequestedPayload:
      type: object
      required:
        - message
        - reason_code
        - novnc_url
      properties:
        message:
          type: string
        reason_code:
          type: string
        novnc_url:
          type: string
      additionalProperties:
        $ref: '#/components/schemas/JsonValue'

    HandoffResumedPayload:
      type: object
      required:
        - message
        - reason_code
        - operator_reply
      properties:
        message:
          type: string
        reason_code:
          type: string
        operator_reply:
          type: string
      additionalProperties:
        $ref: '#/components/schemas/JsonValue'

    PaymentReadyPayload:
      type: object
      required:
        - order_id
        - message
      properties:
        order_id:
          type: string
        message:
          type: string
      additionalProperties:
        $ref: '#/components/schemas/JsonValue'

    ScenarioFinishedPayload:
      type: object
      required:
        - status
        - message
      properties:
        status:
          $ref: '#/components/schemas/ScenarioStatus'
        message:
          type: string
        order_id:
          type:
            - string
            - 'null'
          default: null
        artifacts:
          $ref: '#/components/schemas/JsonObject'
          default: {}
      additionalProperties:
        $ref: '#/components/schemas/JsonValue'

    TraceSummary:
      type: object
      description: Усеченный trace, который buyer прикладывает к `agent_step_finished`.
      properties:
        trace_date:
          type: string
        trace_time:
          type: string
        prompt_path:
          type: string
        prompt_sha256:
          type: string
        trace_file:
          type: string
        browser_actions_log_path:
          type: string
        browser_actions_total:
          type: integer
        duration_ms:
          type: number
        command_duration_ms:
          type: number
        inter_command_idle_ms:
          type: number
        browser_busy_union_ms:
          type: number
        post_browser_idle_ms:
          type: number
        command_errors:
          type: integer
        codex_tokens_used:
          type: integer
        codex_model:
          type: string
        model_strategy:
          type: string
        model_fallback_reason:
          type: string
        codex_returncode:
          type: integer
        prompt_preview:
          type: string
        stdout_tail:
          type: string
        stderr_tail:
          type: string
        browser_actions_tail:
          type: array
          items:
            $ref: '#/components/schemas/JsonObject'
        top_idle_gaps:
          type: array
          items:
            $ref: '#/components/schemas/JsonObject'
        codex_attempts:
          type: array
          items:
            $ref: '#/components/schemas/JsonObject'
      additionalProperties:
        $ref: '#/components/schemas/JsonValue'
